<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ college_name }} Inquiry Chatbot</title>
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>
    <!-- WELCOME FORM -->
    <section id="welcome-view" class="view active">
        <div class="container">
            <h1>{{ college_name }}<br><span class="subtitle">Inquiry Chatbot</span></h1>
            <form id="welcome-form">
                <div class="form-group">
                    <label for="first-name">First Name</label>
                    <input type="text" id="first-name" name="first_name" required>
                </div>
                <div class="form-group">
                    <label for="last-name">Last Name</label>
                    <input type="text" id="last-name" name="last_name" required>
                </div>
                <div class="form-group">
                    <label for="email">Email Address</label>
                    <input type="email" id="email" name="email" required>
                </div>
                <button type="submit" class="btn-primary">Start Chat</button>
            </form>
        </div>
    </section>

    <!-- CHAT VIEW -->
    <section id="chat-view" class="view">
        <div class="container">
            <h2>{{ college_name }} Chatbot</h2>
            <div id="chat-messages"></div>

            <div id="question-buttons" class="question-buttons">
                {% for q in questions %}
                <button class="btn-question" data-question="{{ q }}">{{ q }}</button>
                {% endfor %}
            </div>

            <form id="chat-form" class="chat-input-form">
                <input type="text" id="chat-input" placeholder="Type a question..." autocomplete="off" required>
                <button type="submit" class="btn-send">Send</button>
            </form>

            <div class="chat-actions">
                <button id="end-chat-btn" class="btn-secondary">End Chat</button>
            </div>
        </div>
    </section>

    <!-- CONCLUSION VIEW -->
    <section id="conclusion-view" class="view">
        <div class="container">
            <h2>Chat Summary</h2>
            <div id="conclusion-card" class="conclusion-card">
                <div id="conclusion-content"></div>
            </div>
            <button id="restart-btn" class="btn-primary">Start New Chat</button>
        </div>
    </section>

    <script src="/static/script.js"></script>
</body>
</html>
